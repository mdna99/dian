<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Undangan Pernikahan Dian & Elly</title>
    <style>
        /* === RESET & BASE STYLES === */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            /* Tema gelap ala Code Editor / Futuristic UI */
            background-color: #0d1117;
            color: #c9d1d9;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            overflow: hidden;
            /* Animasi masuk halaman */
            animation: fadeIn 1.5s ease-in-out;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* === MAIN CONTENT (ELEGANT) === */
        .main-content {
            padding: 20px;
        }

        .pre-title {
            font-size: 0.85rem;
            letter-spacing: 4px;
            color: #8b949e;
            margin-bottom: 15px;
            text-transform: uppercase;
        }

        .names {
            font-size: 2.8rem;
            font-weight: 700;
            color: #ffffff;
            margin-bottom: 20px;
            letter-spacing: 1px;
        }

        .divider {
            color: #30363d;
            margin: 15px 0;
            font-weight: 300;
        }

        .message {
            font-size: 1rem;
            font-weight: 300;
            color: #8b949e;
            margin-bottom: 15px;
            font-style: italic;
        }

        .date {
            font-size: 1.2rem;
            font-weight: 500;
            color: #58a6ff;
            /* Aksen biru khas elemen interaktif/futuristik */
            margin-top: 20px;
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        /* === FOOTER (DEV AESTHETIC) === */
        .footer {
            position: absolute;
            bottom: 30px;
            font-family: "Fira Code", "Courier New", Courier, monospace;
            font-size: 0.8rem;
            color: #484f58;
            line-height: 1.6;
        }

        .footer p {
            margin: 0;
        }

        .footer a {
            color: #58a6ff;
            text-decoration: none;
            transition: all 0.3s ease;
            display: inline-block;
        }

        .footer a:hover {
            color: #79c0ff;
            text-decoration: underline;
            text-shadow: 0 0 8px rgba(88, 166, 255, 0.4);
        }

        /* Responsive adjustments */
        @media (max-width: 600px) {
            .names {
                font-size: 2.2rem;
            }

            .pre-title {
                font-size: 0.75rem;
            }

            .message {
                font-size: 0.9rem;
            }

            .footer {
                font-size: 0.75rem;
                bottom: 20px;
            }
        }
    </style>
</head>

<body>

    <main class="main-content">
        <p class="pre-title">The Wedding Of</p>
        <h1 class="names">Muhammad Dian Nafi Aziz <br>& <br> Siti Elly Fatimah</h1>
        <div class="divider">—</div>
        <p class="date">April 2026</p>
    </main>

    <footer class="footer">
        <p>&lt;/&gt; Undangan ini dibuat dengan sepenuh hati oleh :</p>
        <p>Muhammad Dian Nafi' Aziz</p>
        <a href="https://www.instagram.com/muh.dna" target="_blank" rel="noopener noreferrer">@muh.dna</a>
    </footer>

</body>

</html>
